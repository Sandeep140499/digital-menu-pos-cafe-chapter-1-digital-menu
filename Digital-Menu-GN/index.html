<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c2f1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Cafe Chapter 1 </title>
    <meta name="description" content="Cafe Chapter 1 Restaurant Pvt. Ltd. - Digital menu and in-restaurant ordering system. Scan QR code at your table to browse the menu and place orders directly to the kitchen." />
    <meta name="author" content="Cafe Chapter 1 Restaurant Pvt. Ltd." />

    <meta property="og:title" content="Cafe Chapter 1" />
    <meta property="og:description" content="Cafe Chapter 1 Restaurant Pvt. Ltd. - Digital menu and in-restaurant ordering system. Green Park, Gautam Nagar, New Delhi." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root">
      <div class="app-loading" aria-live="polite" aria-busy="true">
        <div class="app-loading-spinner"></div>
        <p class="app-loading-text">Loading...</p>
      </div>
    </div>
    <style>
      .app-loading { min-height: 100dvh; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; }
      .app-loading-spinner { width: 2rem; height: 2rem; border: 2px solid #059669; border-top-color: transparent; border-radius: 9999px; animation: app-spin 0.8s linear infinite; }
      .app-loading-text { margin-top: 1rem; font-size: 0.875rem; color: #64748b; font-family: system-ui, sans-serif; }
      @keyframes app-spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
