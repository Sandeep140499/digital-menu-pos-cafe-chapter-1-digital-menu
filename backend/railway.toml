# Railway – use when deploying this backend (set service root to backend, or deploy from a repo that contains only this folder).
# Docs: https://docs.railway.com/config-as-code/reference

[build]
builder = "nixpacks"
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
# Important: ensure npm start always runs after migrate.
# Use `;` so `npm start` runs even when migrate succeeds or fails.
startCommand = "npx prisma migrate deploy || true; npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
