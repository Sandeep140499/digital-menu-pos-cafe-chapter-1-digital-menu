# Render Blueprint – use when deploying this backend (set "Root Directory" to backend, or deploy from a repo that contains only this folder).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: digital-menu-api
    runtime: node
    buildCommand: "npm ci && npx prisma generate && npm run build"
    startCommand: "npx prisma migrate deploy || true && npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
